<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FTPT19C0BE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-FTPT19C0BE');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekong Intelligence | Stop Guessing. Start Growing.</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="image/MI_Logo_NoText.png">
    <link rel="apple-touch-icon" href="image/MI_Logo_NoText.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Cambodia's Only AI-First Marketing Intelligence Firm. We don't guess. We diagnose. Stop guessing, start growing.">
    <meta name="keywords" content="Marketing Agency Cambodia, SME marketing Phnom Penh, Digital Growth Partner, Brand Architecture, Vosumtey Seng, Mekong Intelligence, ROI Marketing, Generative Engine Optimization">
    <meta name="author" content="Mekong Intelligence">
    <link rel="canonical" href="https://mekongintel.live/">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mi-dark': '#0a0a0a',
                        'mi-cyan': '#00e5ff',
                        'mi-light': '#f5f5f5',
                        'mi-gray': '#1f1f1f'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-mi-dark text-mi-light font-sans antialiased selection:bg-mi-cyan/30 selection:text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVGs replacing external dependencies for stability
        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            X: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            CheckCircle2: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>,
            ArrowRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
            Search: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            BrainCircuit: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/><path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 17h6"/><path d="M21 9V6"/><path d="M21 19v-4"/><path d="M21 14h-3"/></svg>,
            Map: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>,
            Send: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        };

        const Button = ({ children, variant = 'primary', className = '', ...props }) => {
            const baseStyle = "inline-flex items-center justify-center font-bold rounded-lg transition-all duration-300 transform hover:-translate-y-1";
            const variants = {
                primary: "bg-mi-cyan text-mi-dark hover:bg-[#00cce6] shadow-[0_0_20px_rgba(0,229,255,0.3)] hover:shadow-[0_0_30px_rgba(0,229,255,0.5)] px-6 py-3",
                secondary: "bg-transparent border border-white/20 text-white hover:border-mi-cyan/50 hover:bg-mi-cyan/10 px-6 py-3"
            };
            
            return (
                <button className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
                    {children}
                </button>
            );
        };

        const ServiceCard = ({ title, tag, description, features, deliverables, actionText, onAction, isPopular }) => (
            <div className={`p-8 md:p-10 rounded-2xl border ${isPopular ? 'border-mi-cyan bg-mi-gray/80 relative overflow-hidden shadow-[0_0_30px_rgba(0,229,255,0.1)]' : 'border-white/10 bg-mi-gray/30'} flex flex-col h-full hover:border-mi-cyan/50 transition-colors duration-300`}>
                {tag && (
                    <div className="absolute top-0 right-0 bg-mi-cyan text-mi-dark text-xs font-bold px-4 py-1.5 rounded-bl-lg">
                        {tag}
                    </div>
                )}
                <h3 className="text-2xl font-bold mb-4">{title}</h3>
                <p className="text-mi-light/70 mb-8 flex-grow">{description}</p>
                
                <div className="space-y-8 mb-8">
                    {features && features.length > 0 && (
                        <div>
                            <h4 className="text-sm font-semibold text-mi-cyan uppercase tracking-wider mb-3">What we cover:</h4>
                            <ul className="space-y-3">
                                {features.map((feature, idx) => (
                                    <li key={idx} className="flex items-start gap-3 text-sm text-mi-light/80">
                                        <span className="mt-0.5 flex-shrink-0"><Icons.CheckCircle2 /></span>
                                        <span>{feature}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                    
                    {deliverables && deliverables.length > 0 && (
                        <div>
                            <h4 className="text-sm font-semibold text-mi-cyan uppercase tracking-wider mb-3">Deliverables:</h4>
                            <ul className="space-y-3">
                                {deliverables.map((item, idx) => (
                                    <li key={idx} className="flex items-start gap-3 text-sm text-mi-light/80">
                                        <span className="mt-0.5 flex-shrink-0 text-mi-cyan"><Icons.ArrowRight /></span>
                                        <span>{item}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
                
                <Button onClick={onAction} variant={isPopular ? 'primary' : 'secondary'} className="w-full py-4 mt-auto">
                    {actionText}
                </Button>
            </div>
        );

        const BookingModal = ({ isOpen, onClose, packageType }) => {
            if (!isOpen) return null;
            
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-mi-gray rounded-2xl max-w-md w-full p-8 border border-white/10 relative shadow-2xl transform scale-100 transition-transform" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 text-mi-light/50 hover:text-white transition-colors">
                            <Icons.X />
                        </button>
                        <h3 className="text-2xl font-bold mb-2">Let's Talk Strategy</h3>
                        <p className="text-mi-light/70 text-sm mb-8">You're interested in: <span className="text-mi-cyan font-semibold">{packageType}</span></p>
                        
                        <div className="space-y-4">
                            <a href="https://t.me/MekongIntelligence" target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 w-full py-4 rounded-lg bg-mi-cyan text-mi-dark font-bold hover:bg-[#00cce6] transition-colors shadow-lg">
                                <Icons.Send size={20} /> Message on Telegram
                            </a>
                            <a href="mailto:vosumtey@gmail.com" className="block w-full text-center py-4 rounded-lg border border-white/20 text-white hover:bg-white/5 transition-colors font-medium">
                                Email Us
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [modalOpen, setModalOpen] = useState(false);
            const [selectedPackage, setSelectedPackage] = useState('');
            const [isNavOpen, setIsNavOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const openBooking = (pkg) => {
                setSelectedPackage(pkg);
                setModalOpen(true);
                setIsNavOpen(false);
            };

            const pillars = [
                {
                    icon: <Icons.Search />,
                    title: "Audit Before We Build",
                    desc: "We start with data, not assumptions. Before any strategy is made, we audit your digital presence, your competitors, and how AI search sees your brand."
                },
                {
                    icon: <Icons.BrainCircuit />,
                    title: "Intelligence, Not Execution",
                    desc: "We build the system. You or your team execute it. No bloated agency retainers. No junior staff doing the thinking."
                },
                {
                    icon: <Icons.Map />,
                    title: "AI-Powered, Cambodia-Rooted",
                    desc: "AI processes the noise. We filter what actually matters for the Cambodian market."
                }
            ];

            const services = [
                {
                    title: "The Audit",
                    tag: "START HERE",
                    description: "The fastest way to see what's broken. 72 hours. No fluff.",
                    features: [
                        "360° Digital Presence Audit",
                        "Analytics & Channel Health Check",
                        "Traditional Search (SEO/SEM) Review",
                        "AI Search (GEO/AEO) Visibility Scan"
                    ],
                    deliverables: [
                        "Expert Video Walkthrough (Loom)",
                        "Comprehensive Audit Report + Tactical Action Plan"
                    ],
                    actionText: "Book The Audit",
                    isPopular: true
                },
                {
                    title: "The Strategy Sprint",
                    description: "We build your complete marketing system in 3 weeks. Competitor intelligence, brand positioning, content plan, and tracking — all connected and ready to execute.",
                    features: [
                        "Competitor Positioning Map & Brand Messaging Framework",
                        "Audience Profile & 90-Day Content Engine",
                        "Operations & Tech Stack Recommendations",
                        "Tracking Setup & KPI Dashboard"
                    ],
                    deliverables: [
                        "Market Gap Report & Brand Authority Playbook",
                        "90-Day Content Engine & AI Prompt Library",
                        "Growth Roadmap & Tech Stack",
                        "KPI Tracking Dashboard"
                    ],
                    actionText: "Book a Strategy Call",
                    isPopular: false
                },
                {
                    title: "The Intelligence Retainer",
                    description: "Your strategic co-pilot. We run your competitive intelligence every month so you never fall behind.",
                    features: [
                        "Continuous Monitoring & Bi-weekly Competitor Intel",
                        "Monthly Strategy Optimisation",
                        "Priority Advisory Support",
                        "Monthly Tech Update (AI tools & platform changes)"
                    ],
                    deliverables: [
                        "Monthly ROI & Growth Report",
                        "Live Performance Dashboard",
                        "Custom Content Frameworks",
                        "Monthly 1-on-1 Strategy Call"
                    ],
                    actionText: "Start the Retainer",
                    isPopular: false
                },
                {
                    title: "Market Intelligence Dashboard",
                    tag: "ADD-ON",
                    description: "Know what's moving before your competitors do.",
                    features: [
                        "Weekly Industry Pulse: Algorithm changes, new AI tools, economic shifts",
                        "Competitor Movement Tracker: Bi-weekly scans of top 5 competitors",
                        "Trend Opportunity Alerts: Real-time Telegram pings",
                        "AI Search Visibility Monitor: ChatGPT, Gemini, and Google AI",
                        "Monthly Market Snapshot: Top 3 threats, top 3 opportunities, one recommended action"
                    ],
                    actionText: "Get Started",
                    isPopular: false
                },
                {
                    title: "The Full Build",
                    description: "For new businesses or full rebrands. Everything from visual identity to launch campaign — delivered in 6 weeks.",
                    features: [
                        "Complete Visual Identity (logo, colors, fonts)",
                        "Brand Guidelines Document",
                        "Website Content Strategy",
                        "Launch Campaign Plan (30-60-90 days)",
                        "Social Media Template Library",
                        "Sales Materials & Pitch Deck",
                        "3-min Brand Story Video",
                        "3 months Intelligence Retainer included"
                    ],
                    actionText: "Schedule a Consultation",
                    isPopular: false
                }
            ];

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-40 transition-all duration-300 ${scrolled ? 'bg-mi-dark/90 backdrop-blur-md border-b border-white/10 py-4' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 max-w-6xl flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="./image/MI_Logo_NoText.png" alt="MI Logo" className="h-8 w-auto" />
                                <span className="text-xl font-bold tracking-tight">Mekong<span className="text-mi-cyan">Intelligence</span></span>
                            </div>
                            
                            {/* Desktop Nav */}
                            <div className="hidden md:flex items-center gap-8 text-sm font-medium">
                                <a href="#about" className="hover:text-mi-cyan transition-colors">Why Us</a>
                                <a href="#services" className="hover:text-mi-cyan transition-colors">Services</a>
                                <Button onClick={() => openBooking('General Inquiry')} className="px-5 py-2 text-sm">
                                    Contact Us
                                </Button>
                            </div>

                            {/* Mobile Menu Toggle */}
                            <button className="md:hidden text-white focus:outline-none" onClick={() => setIsNavOpen(!isNavOpen)}>
                                {isNavOpen ? <Icons.X /> : <Icons.Menu />}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Nav Menu */}
                    {isNavOpen && (
                        <div className="fixed inset-0 z-30 bg-mi-dark pt-24 px-6 md:hidden">
                            <div className="flex flex-col gap-6 text-lg font-medium">
                                <a href="#about" onClick={() => setIsNavOpen(false)} className="border-b border-white/10 pb-4">Why Us</a>
                                <a href="#services" onClick={() => setIsNavOpen(false)} className="border-b border-white/10 pb-4">Services</a>
                                <Button onClick={() => openBooking('General Inquiry')} className="w-full py-4 mt-4">
                                    Contact Us
                                </Button>
                            </div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-mi-cyan/10 via-mi-dark to-mi-dark -z-10"></div>
                        <div className="container mx-auto px-6 max-w-4xl text-center">
                            <h1 className="text-5xl md:text-6xl lg:text-7xl font-extrabold tracking-tight leading-[1.1] mb-6">
                                Cambodia's Only <span className="text-transparent bg-clip-text bg-gradient-to-r from-mi-cyan to-blue-500">AI-First</span><br/>Marketing Intelligence Firm.
                            </h1>
                            <h2 className="text-xl md:text-2xl text-mi-light/80 font-light mb-6 leading-relaxed">
                                We don't guess. We diagnose. Every strategy we build starts with real competitor data, AI search visibility, and a clear view of where you're bleeding money.
                            </h2>
                            <p className="text-lg text-mi-light/60 mb-10 max-w-2xl mx-auto">
                                Most Cambodian businesses spend $1,200/month on ads with no idea what's working. We fix that — in 72 hours.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row justify-center gap-4">
                                <Button onClick={() => openBooking('The Audit')} className="px-8 py-4 text-lg">
                                    Start with The Audit
                                </Button>
                                <Button onClick={() => openBooking('Strategy Call')} variant="secondary" className="px-8 py-4 text-lg">
                                    Book a Strategy Call
                                </Button>
                            </div>
                        </div>
                    </header>

                    {/* What Makes Us Different */}
                    <section id="about" className="py-24 bg-mi-gray/30 border-y border-white/5 relative">
                        <div className="container mx-auto px-6 max-w-6xl">
                            <div className="text-center mb-16 max-w-3xl mx-auto">
                                <h2 className="text-3xl md:text-4xl font-bold mb-6">What Makes Us Different</h2>
                                <p className="text-lg text-mi-light/60">
                                    We're not an agency. We don't sell likes, pretty content, or vague 'brand awareness.' We sell one thing: clarity. What's broken, what your competitors are doing, and what to fix first.
                                </p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {pillars.map((pillar, idx) => (
                                    <div key={idx} className="bg-mi-dark p-8 rounded-2xl border border-white/10 hover:border-mi-cyan/30 transition-colors">
                                        <div className="w-14 h-14 rounded-xl bg-mi-cyan/10 flex items-center justify-center text-mi-cyan mb-6">
                                            {pillar.icon}
                                        </div>
                                        <h3 className="text-xl font-bold mb-4">{pillar.title}</h3>
                                        <p className="text-mi-light/60 leading-relaxed text-sm">
                                            {pillar.desc}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="services" className="py-24 relative">
                        <div className="container mx-auto px-6 max-w-6xl">
                            <div className="text-center mb-16 max-w-3xl mx-auto">
                                <h2 className="text-3xl md:text-4xl font-bold mb-6">Our Services</h2>
                                <p className="text-lg text-mi-light/60">
                                    Every engagement starts with The Audit. From there, we build the system, then keep you ahead with ongoing intelligence. Choose the level that fits where you are.
                                </p>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-8 lg:gap-10">
                                {services.map((service, index) => (
                                    <div key={index} className={service.title === "The Full Build" ? "md:col-span-2" : ""}>
                                        <ServiceCard 
                                            {...service} 
                                            onAction={() => openBooking(service.title)} 
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Final CTA */}
                    <section className="py-24 bg-mi-gray/50 border-t border-white/5 text-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-mi-cyan/5 via-transparent to-transparent"></div>
                        <div className="container mx-auto px-6 max-w-3xl relative z-10">
                            <h2 className="text-4xl md:text-5xl font-extrabold mb-6">Every engagement starts with The Audit.</h2>
                            <p className="text-xl text-mi-light/60 mb-10">
                                72 hours. We show you exactly where you're losing money and what your competitors are doing instead. From there, you decide how deep you want to go.
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center gap-6">
                                <Button onClick={() => openBooking('The Audit')} className="px-10 py-4 text-lg">
                                    Start with The Audit
                                </Button>
                                <a 
                                href="https://t.me/mekongintelligence" 
                                target="_blank" 
                                rel="noreferrer"
                                className="px-10 py-4 rounded-lg font-bold border border-mi-cyan/50 text-mi-cyan hover:bg-mi-cyan/10 flex items-center justify-center gap-2 transition-colors"
                                >
                                <Icons.Send size={20} /> Book a Strategy Call
                                </a>
                            </div>

                            <div className="mt-16 text-mi-light/50 text-sm">
                                <p>&copy; {new Date().getFullYear()} Mekong Intelligence. All rights reserved.</p>
                                <p className="mt-2">Phnom Penh, Cambodia</p>
                            </div>
                        </div>
                    </section>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
